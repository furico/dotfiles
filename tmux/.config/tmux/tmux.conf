# tmux.conf — AI エージェント + tmux + Neovim 運用向け設定（macOS / ghostty）
#
# 設計の前提: Neovim 設定（~/.config/nvim/）がこの三者構成を前提に実装されている。
# 本ファイルはその「もう半分」として、Neovim が依存する契約を tmux 側で満たす。
# 各設定には「なぜ必要か」をコメントで残す（Neovim パッケージの方針に合わせる）。

# ── 契約設定（Neovim が前提とする正しさ。外すと nvim 側が誤動作する）─────────

# フォーカスイベントを内側のアプリへ伝搬する。別ペインの AI エージェントが
# ディスク上のファイルを書き換えた後、Neovim ペインへ戻った瞬間に
# nvim の FocusGained → checktime（autocmds.lua）が発火して再読み込みされる。
set -g focus-events on

# <Esc>／端末モード離脱 <Esc><Esc> の遅延を消す。既定 500ms は nvim で致命的。
set -sg escape-time 0

# truecolor パススルー。nvim の termguicolors の色化けを防ぐ。
# default-terminal は tmux 内の TERM。RGB を「外側の実端末」に対して付与する。
# usstyle はスタイル付き下線（nvim LSP 診断の undercurl）を通すため。
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-ghostty:RGB:usstyle"
set -ga terminal-features ",xterm-256color:RGB:usstyle"

# システムクリップボード連携（OSC 52）。nvim の clipboard=unnamedplus のヤンクを
# 実端末（ghostty）経由でクリップボードへ送る。SSH 越しでも機能する。
set -g set-clipboard on

# ── キー: prefix と基本操作 ───────────────────────────────────────────────

# prefix を C-q に。C-a（readline 行頭・nvim の C-a）/ C-Space（IME 競合）を避けた選択。
# 注: C-q は XON フロー制御に使われるが tmux 内では tmux が奪うため動作する。
# シェルでの C-q/C-s 解放（stty -ixon）は zsh パッケージ側で別途行う。
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# 設定リロード。
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ペイン分割は現在のディレクトリを引き継ぐ。記号で向きが直感的に分かる | と -。
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 新規ウィンドウも現在ディレクトリを引き継ぐ。
bind c new-window -c "#{pane_current_path}"

# ペイン移動: prefix + hjkl（-r で続けて押せる）。
# シームレス移動（vim-tmux-navigator の C-hjkl）は採用しない。C-hjkl は nvim 挿入モード・
# シェルの readline・AI エージェント（Claude Code の C-j=改行 など）が使うため、奪わない。
# 既定の prefix + l（last-window）はペイン移動に上書きする。
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ペインのリサイズ: prefix + HJKL（-r でリピート可能）。
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── 表示・操作の QoL ──────────────────────────────────────────────────────

# ステータスラインのメッセージ表示時間。既定 750ms は短く読み逃すため伸ばす。
set -g display-time 4000

# ウィンドウ/ペイン番号を 1 始まりに。閉じたら詰める。
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# マウス有効（ペインのリサイズ・スクロール・選択）。
set -g mouse on

# ── コピーモード（vi キーバインド）────────────────────────────────────────
# vi ユーザー向け。選択→ヤンクは set-clipboard 経由で OSC 52 によりクリップボードへ。
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── AI エージェント向けレイヤ ─────────────────────────────────────────────

# 長いエージェント出力をさかのぼれるよう、スクロールバックを大きく取る。
set -g history-limit 50000

# 背景ペインの状態を可視化する。アクティビティはステータスにフラグ表示し、
# 通知は音ではなく視覚的に出す（visual-*）。
set -g monitor-activity on
set -g visual-activity on
set -g visual-bell on
set -g visual-silence on

# 「エージェントが一定時間 無音 = 処理完了の目安」を検知するトグル。
# 既定では無音監視は OFF。完了を待ちたいウィンドウで prefix + M で 15 秒監視を ON にし、
# 無音になるとステータスに ~ フラグが立つ。閾値 15s は調整前提の初期値。
bind M if -F '#{monitor-silence}' \
  'setw monitor-silence 0 ; display-message "silence monitor: OFF"' \
  'setw monitor-silence 15 ; display-message "silence monitor: ON (15s)"'

# レイアウトを崩さずスクラッチ操作するポップアップ。
# prefix + g: フローティングのシェル（現在ディレクトリ）。
# prefix + C-g: lazygit（インストール時のみ）。
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind C-g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# ── プラグイン（TPM）──────────────────────────────────────────────────────
# 初回は README の手順で TPM をクローンし、tmux 内で prefix + I を実行して取得する。
# 現状 TPM が管理する追加プラグインは無い。将来テーマ等を入れるための足場として残す。
# 以下はいずれも意図的に入れていない:
#   - vim-tmux-navigator（シームレス移動）… C-hjkl が nvim 挿入モード・シェルの readline・
#       AI エージェント（Claude Code の C-j=改行 など）と衝突して奪うため不採用。
#       ペイン移動は prefix + hjkl で行う（上のキー設定）。
#   - テーマ … Neovim のカラースキーム未定。確定後に系統を揃える。
#   - tmux-yank … set-clipboard on（OSC 52）で代替可能。
#   - resurrect/continuum … AI エージェントはプロセス状態まで復元できず価値が限定的。
#
# プラグインの実体は stow 管理の外（XDG データ領域）に置く。~/.config/tmux は
# stow でリポジトリへ symlink されているため、既定の ~/.config/tmux/plugins/ に
# クローンするとダウンロード物がリポジトリ内に混ざる。それを避ける。
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'

# TPM の初期化はファイル末尾に置く（他設定をすべて読み込んだ後に走らせる）。
run '~/.local/share/tmux/plugins/tpm/tpm'
